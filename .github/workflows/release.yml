name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. 1.7.11.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"

      - name: Verify version derives from tag
        run: |
          poetry self add "poetry-dynamic-versioning[plugin]"
          RESOLVED="$(poetry version --short)"
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "resolved=$RESOLVED tag=$TAG"
          if [ "$RESOLVED" != "$TAG" ]; then
            echo "::error::poetry version ($RESOLVED) does not match tag ($TAG)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: poetry build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
