name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches new CVE disclosures against unchanged deps.
    - cron: "37 5 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install "bandit[sarif,toml]==1.8.0"

      # Full scan → SARIF for the Security tab, informational only.
      - name: Bandit scan (SARIF upload)
        run: |
          bandit -r opentakserver \
            -f sarif -o bandit.sarif \
            --exit-zero

      - name: Upload Bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      # Gating scan compares against .bandit-baseline.json — pre-existing
      # HIGH findings in upstream code are accepted; any NEW HIGH finding
      # blocks the merge. Regenerate the baseline only when the operator
      # has intentionally reviewed and accepted new findings:
      #   bandit -r opentakserver -f json -o .bandit-baseline.json \
      #     --severity-level high
      - name: Bandit gate (baseline-diff on HIGH severity)
        run: |
          bandit -r opentakserver \
            --baseline .bandit-baseline.json \
            --severity-level high

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"

      - name: Export requirements from poetry.lock
        run: |
          poetry self add poetry-plugin-export
          poetry export --without-hashes --format requirements.txt --output requirements.txt

      - name: Install pip-audit
        run: pip install "pip-audit==2.7.3"

      # Build --ignore-vuln flags from .pip-audit-ignore.txt so pre-existing
      # CVEs against upstream's pinned deps don't block merges. Any CVE not
      # in the baseline file (i.e. newly disclosed or newly introduced by a
      # dep change) fails the gate. Dependabot (enabled by
      # setup-branch-protection.sh) opens PRs to actually fix these — when
      # a PR bumps a dep past the vulnerable range, drop the corresponding
      # CVE IDs from .pip-audit-ignore.txt.
      - name: Run pip-audit (baseline-diff)
        run: |
          IGNORE_FLAGS=()
          while IFS= read -r line; do
            # Strip comments and blank lines
            id="${line%%#*}"
            id="$(echo -n "$id" | tr -d '[:space:]')"
            [ -n "$id" ] && IGNORE_FLAGS+=(--ignore-vuln "$id")
          done < .pip-audit-ignore.txt
          echo "Ignoring ${#IGNORE_FLAGS[@]} CVE IDs (2 per flag = ${#IGNORE_FLAGS[@]} / 2)"
          pip-audit --requirement requirements.txt --strict "${IGNORE_FLAGS[@]}"

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can inspect the whole PR range.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
